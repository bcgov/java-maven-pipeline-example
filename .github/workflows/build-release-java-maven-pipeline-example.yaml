name: 'Build and publish - java-maven-pipeline-example'

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'main'
  pull_request:
    branches:
      - main
  workflow_dispatch:
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BROKER_URL: https://broker.io.nrs.gov.bc.ca
  BROKER_JWT: ${{ secrets.broker_jwt_e985d455_b0ff_470b_8731_e004fcfac915 }}
  SERVICE_PROJECT: oscar-example
  SERVICE_NAME: java-maven-pipeline-example
  DEFAULT_VERSION: ${{ vars.DEFAULT_VERSION || '0.0.0' }}-SNAPSHOT

jobs:
  preflight:
    name: Preflight
    uses: ./.github/workflows/preflight.yaml
    permissions:
      contents: read
      actions: read
    with:
      preflight_context: build
      catalog_info: catalog-info.yaml
    secrets:
      token: ${{ secrets.broker_jwt_e985d455_b0ff_470b_8731_e004fcfac915 }}
  build-publish:
    name: Build and publish
    runs-on: ubuntu-latest
    needs: preflight
    permissions:
      contents: read
      packages: write
      pull-requests: read
    outputs:
      project_version: ${{ steps.set-build-output-parameters.outputs.project_version }}
      intention_id: ${{ steps.set-intention-id.outputs.intention_id }}
      branch: $${{ steps.set-branch.outputs.branch }}
    steps:
      - name: Lookup PR Merge Ref
        id: lookup-pr-merge-ref
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "checkout_ref=${{ github.ref }}" >> $GITHUB_OUTPUT
            echo "version_modifier=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          elif [[ ${{ github.ref_name != 'main' }} = true ]]; then
            RESPONSE=$(curl -s "https://api.github.com/repos/bcgov/java-maven-pipeline-example/pulls?head=bcgov:${{ github.head_ref || github.ref_name }}&state=open&base=main" \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json")
            PULL_REQUEST_NUMBER=$(echo "${RESPONSE}" | jq -r .[0].number)
            RESPONSE=$(curl -s "https://api.github.com/repos/bcgov/java-maven-pipeline-example/pulls/$PULL_REQUEST_NUMBER" \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json")
            MERGEABLE=$(echo "${RESPONSE}" | jq -r .mergeable)
            if [[ "$MERGEABLE" != "true" ]]; then
              echo "::error ::Pull request #$PULL_REQUEST_NUMBER is not mergeable… aborted."
              echo "This can be resolved by resolving the merge conflict with the main branch."
              exit 1
            fi
            echo "checkout_ref=refs/pull/$PULL_REQUEST_NUMBER/merge" >> $GITHUB_OUTPUT
            echo "version_modifier=$PULL_REQUEST_NUMBER" >> $GITHUB_OUTPUT
          else
            echo "checkout_ref=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "version_modifier=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
            fetch-depth: 0
            fetch-tags: true
            ref: ${{ steps.lookup-pr-merge-ref.outputs.checkout_ref }}
      - name: Setup ORAS
        uses: oras-project/setup-oras@v2
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Set branch
        id: set-branch
        if: ${{ ! startsWith(github.ref, 'refs/tags/v') }}
        run: |
          if [[ ${{ startsWith(github.ref, 'refs/heads/') }} = true ]]; then
            echo "branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi
          if [[ ${{ startsWith(github.ref, 'refs/pull/') }} = true ]]; then
            echo "branch=${{ github.head_ref }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Set version
        id: set-version
        shell: bash
        run: |
          if [[ ${{ startsWith(github.ref, 'refs/tags/v') }} = true ]]; then
            TAG=${{ github.ref_name }}
            APP_VERSION=${TAG#v}
          else
            APP_VERSION=${DEFAULT_VERSION/%SNAPSHOT/${{ steps.lookup-pr-merge-ref.outputs.version_modifier }}-SNAPSHOT}
          fi
          echo "VERSION=${APP_VERSION}" >> $GITHUB_ENV
        env:
          DEFAULT_VERSION: ${{ env.DEFAULT_VERSION }}
      - name: Set build output parameters
        id: set-build-output-parameters
        run: |
          source ./env.sh build ./ --skip-vault
          echo "project_version=${VERSION}" >> $GITHUB_OUTPUT
          echo "artifact_id=$(./mvnw help:evaluate -Dexpression=project.artifactId -q -DforceStdout)" >> $GITHUB_OUTPUT
          echo "package_type=$(./mvnw help:evaluate -Dexpression=project.packaging -q -DforceStdout)" >> $GITHUB_OUTPUT
          echo "git_commit=$(git rev-parse --verify HEAD)" >> $GITHUB_OUTPUT
          echo "build_guid=uuid::$(uuidgen)" >> $GITHUB_OUTPUT
      - name: Build intention
        run: sh ./.github/workflows/build-intention-java-maven-pipeline-example.sh
        env:
          EVENT_REASON: Build ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository}}
          GITHUB_RUN_ID: ${{ github.run_id}}
          PACKAGE_BUILD_GUID:  ${{ steps.set-build-output-parameters.outputs.build_guid }}
          PACKAGE_BUILD_NUMBER: ${{ github.run_number }}
          PACKAGE_BUILD_VERSION: ${{ steps.set-build-output-parameters.outputs.git_commit }}
          PACKAGE_TYPE: application/java-archive
          PACKAGE_VERSION: ${{ steps.set-build-output-parameters.outputs.project_version }}
      - name: Open intention
        uses: bcgov-nr/action-broker-intention-open@v2
        with:
          broker_jwt: ${{ secrets.broker_jwt_e985d455_b0ff_470b_8731_e004fcfac915 }}
          intention_path: intention.json
          quickstart: true
      - name: Echo intention ID for deploy job
        id: set-intention-id
        run: |
          echo "intention_id=${INTENTION_ID}" >> $GITHUB_OUTPUT
        env:
          INTENTION_ID: ${{ env.INTENTION_ID }}
      - name: Publish artifact
        id: publish-artifact
        working-directory: ./
        run: |
          set -euo pipefail
          ARTIFACT_NAME="${ARTIFACT_ID}-${PROJECT_VERSION}.${PACKAGE_TYPE}"
          source ./env.sh build ./ --skip-vault
          ./mvnw --batch-mode -Dmaven.test.skip=true clean package
          cd target
          cat <<EOF > annotation.json
          {
            "\$manifest": {
              "org.opencontainers.image.description": "Build artifact for ${ARTIFACT_ID} version ${PROJECT_VERSION}",
              "org.opencontainers.image.licenses": "Apache-2.0",
              "org.opencontainers.image.source": "${{ github.repositoryUrl }}",
              "org.opencontainers.image.title": "${ARTIFACT_ID}-artifact",
              "org.opencontainers.image.version": "${PROJECT_VERSION}"
            }
          }
          EOF
          oras login ghcr.io -u ${{ github.actor }} --password-stdin <<< ${{ secrets.GITHUB_TOKEN }}
          oras push --annotation-file annotation.json --export-manifest manifest.json ghcr.io/${{ github.repository }}/java-maven-pipeline-example:${PROJECT_TAG} ${ARTIFACT_NAME}
          MANIFEST=$(cat ./manifest.json)
          echo $MANIFEST
          echo "artifact_sha256=$(echo $MANIFEST | jq -r '.layers | map(.digest) | join(",")' | sha256sum | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "artifact_size=$(echo $MANIFEST | jq -r '.layers | map(.size) | add')" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_VERSION: ${{ steps.set-build-output-parameters.outputs.project_version }}
          ARTIFACT_ID: ${{ steps.set-build-output-parameters.outputs.artifact_id }}
          PACKAGE_TYPE: ${{ steps.set-build-output-parameters.outputs.package_type }}
          PROJECT_TAG: ${{ steps.set-build-output-parameters.outputs.project_version }}
      - name: Send build info
        run: |
          curl -s POST ${{ env.BROKER_URL }}/v1/intention/action/patch \
              -H 'Content-Type: application/json' \
              -H 'X-Broker-Token: '"${BUILD_TOKEN}"'' \
              -d '{"package":{"checksum": "sha256:'${ARTIFACT_SHA256}'"}}'
        env:
          ARTIFACT_SHA256: ${{ steps.publish-artifact.outputs.artifact_sha256 }}
          BUILD_TOKEN: ${{ env.ACTION_TOKEN_BUILD }}
      - name: Close intention
        if: ${{ success() && env.INTENTION_TOKEN != '' }}
        uses: bcgov-nr/action-broker-intention-close@v3
        with:
          intention_token: ${{ env.INTENTION_TOKEN }}
      - name: Close intention (Failure)
        if: ${{ failure() && env.INTENTION_TOKEN != '' }}
        uses: bcgov-nr/action-broker-intention-close@v3
        with:
          intention_token: ${{ env.INTENTION_TOKEN }}
          outcome: failure
